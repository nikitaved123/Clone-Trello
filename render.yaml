services:
  - type: web
    name: clone-trello
    runtime: elixir
    plan: free
    repo: https://github.com/nikitaved123/Clone-Trello
    branch: main
    buildCommand: ./build.sh
    startCommand: >-
      _build/prod/rel/trello_clone/bin/trello_clone eval TrelloClone.Release.migrate
      && _build/prod/rel/trello_clone/bin/trello_clone eval TrelloClone.Release.seed
      && _build/prod/rel/trello_clone/bin/trello_clone start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-clone-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: POOL_SIZE
        value: "5"
      - key: PHX_SERVER
        value: "true"

databases:
  - name: trello-clone-db
    plan: free
