services:
  - type: web
    name: clone-trello
    runtime: elixir
    plan: free
    repo: https://github.com/nikitaved123/Clone-Trello
    branch: main
    buildCommand: >-
      cd client && npm ci && npm run build && cd ..
      && mix deps.get --only prod
      && MIX_ENV=prod mix compile
      && MIX_ENV=prod mix release
    startCommand: >-
      _build/prod/rel/trello_clone/bin/trello_clone eval TrelloClone.Release.migrate
      && _build/prod/rel/trello_clone/bin/trello_clone eval TrelloClone.Release.seed
      && _build/prod/rel/trello_clone/bin/trello_clone start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-clone-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: POOL_SIZE
        value: "5"

databases:
  - name: trello-clone-db
    plan: free
